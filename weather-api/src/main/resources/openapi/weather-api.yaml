openapi: 3.0.3
info:
  title: Weather API
  description: Read-only API for current and historic weather data.
  version: "1.0"

paths:
  /api/weather:
    get:
      operationId: getCurrentWeather
      tags:
        - weather
      summary: Current weather for a page of cities, ordered alphabetically by name.
      parameters:
        - name: page
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: A page of cities with their current weather.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherListResponse"

  /api/weather/{id}:
    get:
      operationId: getWeatherHistory
      tags:
        - weather-history
      summary: Past-week weather for one city as a fixed 6-hour bucket grid.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: >-
            The city's past-week weather in 6-hour buckets. An existing city with
            no measurements still returns 200 with the full bucket grid, each
            bucket carrying null readings (cf. the list endpoint's null readings).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherHistoryResponse"
        "404":
          description: No city with the given id.

components:
  schemas:
    WeatherListResponse:
      type: object
      required:
        - metadata
        - cities
      properties:
        metadata:
          $ref: "#/components/schemas/WeatherPageMetadata"
        cities:
          type: array
          items:
            $ref: "#/components/schemas/CitySummary"

    WeatherHistoryResponse:
      type: object
      required:
        - id
        - name
        - warnings
        - buckets
      properties:
        id:
          type: integer
          format: int64
          example: 42
        name:
          type: string
          example: Berryham-upon-Wicket
        warnings:
          type: array
          description: Warnings active at query time. Always empty until weather warnings land.
          items:
            $ref: "#/components/schemas/Warning"
        buckets:
          type: array
          description: >-
            Fixed 6-hour bucket grid (boundaries 02:00/08:00/14:00/20:00 UTC),
            oldest first: 24 complete buckets plus the current partial one. Empty
            buckets carry null readings rather than being omitted.
          items:
            $ref: "#/components/schemas/WeatherBucket"

    WeatherBucket:
      type: object
      required:
        - startTime
      properties:
        startTime:
          type: string
          format: date-time
          description: Inclusive start of the 6-hour bucket, ISO-8601 UTC.
        temperature:
          type: number
          format: double
          nullable: true
          description: Mean temperature in °C over the bucket, null if no readings.
          example: 22.1
        windSpeed:
          type: number
          format: double
          nullable: true
          description: Mean wind speed in m/s over the bucket, null if no readings.
          example: 3.2
        windDirection:
          type: integer
          nullable: true
          description: >-
            Speed-weighted mean wind direction in whole degrees over the bucket,
            null if no readings. Always paired with windSpeed: both null or both present.
          example: 187

    WeatherPageMetadata:
      type: object
      required:
        - page
        - pageSize
        - totalCities
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 25
        totalCities:
          type: integer
          example: 100

    CitySummary:
      type: object
      required:
        - id
        - name
        - warnings
      properties:
        id:
          type: integer
          format: int64
          example: 42
        name:
          type: string
          example: Berryham-upon-Wicket
        temperature:
          type: number
          format: double
          nullable: true
          description: Mean temperature in °C over the past hour, null if no readings.
          example: 23.4
        windSpeed:
          type: number
          format: double
          nullable: true
          description: Mean wind speed in m/s over the past hour, null if no readings.
          example: 1.4
        windDirection:
          type: integer
          nullable: true
          description: >-
            Speed-weighted mean wind direction in whole degrees (meteorological
            convention: blowing from, 0 = north) over the past hour, null if no
            readings. Always paired with windSpeed: both null or both present.
          example: 40
        warnings:
          type: array
          description: Warnings active at query time. Always empty until weather warnings land.
          items:
            $ref: "#/components/schemas/Warning"

    Warning:
      type: object
      required:
        - description
        - severity
        - startTime
        - endTime
      properties:
        description:
          type: string
          example: High winds
        severity:
          type: string
          example: yellow
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
