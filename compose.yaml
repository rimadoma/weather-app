services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: weather
      POSTGRES_USER: weather
      POSTGRES_PASSWORD: weather
    ports:
      - "5432:5432"
    volumes:
      # 18+ images mount the parent dir, not .../data -- the image manages
      # major-version subdirectories under it (docker-library/postgres#1259)
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather -d weather"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management
    # User, vhost, and topology all come from definitions.json (loaded via
    # the conf.d snippet below) -- no RABBITMQ_DEFAULT_USER/PASS here, so
    # there's exactly one place that bootstraps the broker, not two.
    volumes:
      - ./infra/conf.d/20-definitions.conf:/etc/rabbitmq/conf.d/20-definitions.conf:ro
      - ./infra/definitions.json:/etc/rabbitmq/definitions.json:ro
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
